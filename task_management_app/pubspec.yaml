name: task_management_app
description: A premium Task Management Mobile App UI built with Flutter and Material 3.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Routing
  go_router: ^13.0.0

  # UI & Design
  google_fonts: ^6.1.0
  iconsax_flutter: ^1.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  fl_chart: ^0.66.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
